name: Ingestão Diciotech (glossário tech)

# Diciotech é colaborativo e cresce continuamente.
# Rodamos quinzenalmente + manual.
on:
  schedule:
    - cron: "0 7 1,15 * *"  # dia 1 e 15 de cada mês, 07:00 UTC
  workflow_dispatch:
    inputs:
      lang:
        description: "Idioma: pt-br, en-us ou all"
        default: "all"

concurrency:
  group: ingest-diciotech
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r ingestao/requirements.txt pyyaml

      - name: Ingerir Diciotech
        run: |
          LANG_ARG="${{ github.event.inputs.lang }}"
          python3 -m ingestao.seed_diciotech --lang "${LANG_ARG:-all}"
