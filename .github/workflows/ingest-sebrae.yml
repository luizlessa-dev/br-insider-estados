name: Ingestão SEBRAE — Contratos, Licitações, Convênios

# Cadência: mensal, dia 3 às 08:00 UTC (05:00 BRT).
# Fonte: Qlik Engine API — paineis-lai.sebrae.com.br (WebSocket, sem auth)
# App ID: e2407c39-2fb9-4637-bf20-7eb974711cea
# Volume: ~480k contratos + 21k licitações + 2.8k convênios + 1.9k patrocínios
# Tempo estimado: ~15 minutos

on:
  schedule:
    - cron: "0 8 3 * *"
  workflow_dispatch:
    inputs:
      tabelas:
        description: "Tabelas a ingerir (vírgula-separadas). Vazio = todas."
        default: ""

concurrency:
  group: ingest-sebrae
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SUPABASE_URL:                      ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY:         ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      INTERNAL_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.INTERNAL_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ingestao/requirements.txt

      - name: Instalar dependências
        run: pip install -r ingestao/requirements.txt websockets

      - name: Ingerir SEBRAE
        run: python -m ingestao.sebrae_connector

      - name: Notificar falha
        if: failure()
        run: |
          echo "::error::Falha na ingestão SEBRAE — verificar logs acima."
