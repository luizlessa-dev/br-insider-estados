name: Ingestão CPGF

# Cadência: mensal, dia 10 às 11:00 UTC (08:00 BRT).
# O Portal da Transparência publica o CSV do mês anterior com ~8 dias de atraso.

on:
  schedule:
    - cron: "0 11 10 * *"
  workflow_dispatch:
    inputs:
      anos:
        description: "Anos a ingerir separados por espaço (ex: 2023 2024)"
        default: ""
      backfill:
        description: "Ingerir desde 2003?"
        type: boolean
        default: false

concurrency:
  group: ingest-cpgf
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r ingestao/requirements.txt

      - name: Ingerir CPGF
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python -m ingestao.portal.cpgf_connector --backfill
          elif [ -n "${{ github.event.inputs.anos }}" ]; then
            python -m ingestao.portal.cpgf_connector ${{ github.event.inputs.anos }}
          else
            python -m ingestao.portal.cpgf_connector
          fi
