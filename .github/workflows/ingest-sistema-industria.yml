name: Ingestão Sistema Indústria — SESI + SENAI

# Cadência: mensal, dia 5 às 08:00 UTC (05:00 BRT).
# Fonte: sistematransparenciaweb.com.br — REST API pública (sem autenticação)
# Entidades: SENAI + SESI (27 DRs cada) — dados desde 2022
# Módulos: contratos, licitações (+ participantes), convênios
# Tempo estimado: ~20 minutos (810 combinações entidade×UF×ano × 3 módulos)

on:
  schedule:
    - cron: "0 8 5 * *"
  workflow_dispatch:
    inputs:
      modo:
        description: "Modo de execução: all | extract | load"
        default: "all"

concurrency:
  group: ingest-sistema-industria
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_URL:                       ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY:          ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      INTERNAL_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.INTERNAL_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ingestao/requirements.txt

      - name: Instalar dependências
        run: pip install -r ingestao/requirements.txt

      - name: Ingerir Sistema Indústria (SESI + SENAI)
        run: |
          MODO="${{ github.event.inputs.modo || 'all' }}"
          python -m ingestao.sistema_industria_connector "$MODO"

      - name: Notificar falha
        if: failure()
        run: |
          echo "::error::Falha na ingestão Sistema Indústria — verificar logs acima."
