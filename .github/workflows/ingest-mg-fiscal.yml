name: Ingestão MG Fiscal (empenhos estaduais)

# Portal de Dados Abertos de MG atualiza os CSVs semanalmente.
# Rodamos toda segunda-feira às 07:00 UTC (04:00 BRT) + manual.
on:
  schedule:
    - cron: "0 7 * * 1"   # toda segunda-feira, 07:00 UTC
  workflow_dispatch:
    inputs:
      anos:
        description: "Anos a ingerir separados por espaço (ex: 2025 2026). Vazio = apenas ano corrente."
        default: ""

concurrency:
  group: ingest-mg-fiscal
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r ingestao/requirements.txt

      - name: Ingerir empenhos MG
        run: |
          ANOS_ARG="${{ github.event.inputs.anos }}"
          if [ -n "$ANOS_ARG" ]; then
            # Anos específicos passados via workflow_dispatch
            for ANO in $ANOS_ARG; do
              python3 -m ingestao.mg_fiscal.runner --ano $ANO
            done
          else
            # Default: só o ano corrente (atualizações semanais são incrementais)
            ANO_CORRENTE=$(date +%Y)
            python3 -m ingestao.mg_fiscal.runner --ano $ANO_CORRENTE
          fi
