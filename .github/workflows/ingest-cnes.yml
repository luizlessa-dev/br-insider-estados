name: Ingestão CNES (estabelecimentos de saúde)

# CNES é atualizado mensalmente pelo Ministério da Saúde.
# Rodamos na primeira segunda-feira de cada mês + manual.
on:
  schedule:
    - cron: "0 6 1-7 * 1"   # primeira segunda-feira do mês, 06:00 UTC
  workflow_dispatch:
    inputs:
      uf:
        description: "UF(s) específica(s) separadas por espaço (ex: MG SP). Vazio = todas."
        default: ""

concurrency:
  group: ingest-cnes
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # Brasil inteiro leva ~60-90min
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r ingestao/requirements.txt

      - name: Ingerir CNES
        run: |
          UF_ARG="${{ github.event.inputs.uf }}"
          if [ -n "$UF_ARG" ]; then
            python3 -m ingestao.cnes_runner --uf $UF_ARG
          else
            python3 -m ingestao.cnes_runner
          fi
